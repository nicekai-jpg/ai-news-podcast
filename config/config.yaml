podcast:
  title: "AI 每日先锋"
  description: "每天 5 分钟，聚合 AI 领域最新发布、技术进展、行业事件与人物采访。"
  language: "zh-cn"
  author: "AI 先锋"
  explicit: false
  category: "Technology"
  keep_last: 30
  max_stories: 8

tts:
  backend: "cosyvoice2"              # edge-tts | cosyvoice2 | hybrid
  fallback_backend: "edge-tts"
  host_a_voice: "zh-CN-YunxiNeural"  # edge / hybrid 降级时使用
  host_b_voice: "zh-CN-XiaoxiaoNeural"
  voice: "zh-CN-XiaoxiaoNeural"      # 兼容旧配置
  bgm_path: "assets/bgm_placeholder.wav"
  cosyvoice:
    model_dir: ""                    # 空则读 COSYVOICE_MODEL_DIR 环境变量
    ref_audio:
      host_a: "asset/refs/host_a_ref.wav"
      host_a_text: "asset/refs/host_a_ref.txt"
      host_b: "asset/refs/host_b_ref.wav"
      host_b_text: "asset/refs/host_b_ref.txt"
  rate: "+0%"
  volume: "+0%"
  pitch: "+0Hz"
  mood_presets:
    hook: {rate: "+8%", pitch: "+8Hz", instruct: "用吸引注意力的悬念语气说"}
    excited: {rate: "+15%", pitch: "+10Hz", instruct: "用兴奋的语气播报"}
    serious: {rate: "-5%", pitch: "-5Hz", instruct: "用严肃的新闻主播语气说"}
    calm: {rate: "+0%", pitch: "-2Hz", instruct: "用平稳冷静的语气叙述"}
    emphasis: {rate: "-10%", pitch: "+5Hz", instruct: "放慢语速，加重语气强调"}
    closing: {rate: "-3%", pitch: "-3Hz", instruct: "用收束总结的语气说"}
  chunk_silence_ms: 500
  audio:
    bgm_volume_db: -12
    bgm_fade_in_ms: 2000
    bgm_fade_out_ms: 3000
    vocal_pad_ms: 1000
    loudnorm: "I=-16:LRA=11:TP=-1.5"
    sample_rate: 24000
    chunk_silence_base: 300
    chunk_silence_min: 400
    chunk_silence_max: 800
    chunk_silence_jitter: 100

fetch:
  timeout_seconds: 10
  user_agent: "ai-news-podcast/0.1 (+https://github.com/)"
  max_items_per_feed: 30
  junk_summary_patterns:
    - "illustration of"
    - "collage of"
    - "photo of"
    - "image of"
    - "an illustration"
    - "a collage"
    - "a photo"
    - "featured image"
  category_keywords:
    model:
      - "模型"
      - "model"
      - "参数"
      - "parameter"
      - "benchmark"
      - "SOTA"
      - "训练"
      - "training"
    product:
      - "发布"
      - "推出"
      - "上线"
      - "launch"
      - "release"
      - "产品"
      - "API"
    research:
      - "论文"
      - "paper"
      - "arxiv"
      - "研究"
      - "research"
      - "算法"
      - "method"
    open_source:
      - "开源"
      - "GitHub"
      - "open source"
      - "repo"
      - "仓库"
    policy:
      - "政策"
      - "监管"
      - "安全"
      - "法案"
      - "regulation"
      - "policy"
      - "safety"
      - "合规"
    tool:
      - "工具"
      - "tool"
      - "插件"
      - "plugin"
      - "框架"
      - "framework"
      - "SDK"
      - "库"

selection:
  prefer_recent_hours: 36
  fallback_recent_hours: 96
  per_feed_cap: 6
  include_keywords:
    - "AI"
    - "人工智能"
    - "大模型"
    - "LLM"
    - "多模态"
    - "智能体"
    - "agent"
    - "微调"
    - "RAG"
    - "生成式"
    - "扩散"
    - "Transformer"
    - "算力"
    - "GPU"
    - "Claude"
    - "ChatGPT"
    - "OpenAI"
    - "Anthropic"
    - "DeepMind"
    - "Hugging Face"
    - "英伟达"
    - "NVIDIA"
  exclude_keywords: []

processing:
  thesis_templates:
    - "今天的AI领域，{main_topic}正在重塑行业格局"
    - "从{main_topic}到{sub_topic}，AI技术持续加速演进"
    - "{main_topic}——这可能是本周最值得关注的AI趋势"
    - "当{main_topic}遇上实际落地，我们看到了什么"
    - "围绕{main_topic}，多方力量正在汇聚"
  dedup:
    rapidfuzz_threshold: 92
    jieba_keyword_overlap: 0.35
    title_sim_threshold: 85
    dedup_window_hours: 48
    semantic_sim_threshold: 0.20
    recent_episodes_limit: 14
    semantic_model: "paraphrase-multilingual-MiniLM-L12-v2"
  clustering:
    ngram_range: [2, 4]
    eps: 0.35
    min_samples: 2
  scoring:
    dimensions:
      - "impact_scope"
      - "novelty"
      - "explainability"
      - "listener_relevance"
      - "source_richness"
    role_thresholds:
      main: [12, 15]
      supporting: [8, 11]
      quick: [5, 7]
      skip_below: 5
  source_authority:
    official: 1
    research: 2
    news: 3
    product: 3
    analysis: 3
    tools: 4
    events: 4
  story_memory_days: 90
  max_pages_per_episode: 80

script:
  mode_a:
    name: "连点成线"
    hook_chars: [150, 180]
    thesis_chars: [120, 160]
    main_chars: [1200, 1500]
    supporting_chars: [450, 550]
    quick_chars: [300, 450]
    closing_chars: [150, 220]
  mode_b:
    name: "工具优先"
  style:
    sentence_length: [12, 28]
    banned_words:
      - "废话不多说"
      - "众所周知"
      - "颠覆"
      - "炸裂"
      - "重磅"
      - "王炸"
      - "杀疯了"
      - "遥遥领先"
      - "细思极恐"
    total_chars: [800, 2500]
    target_duration_minutes: [5, 10]

llm:
  provider: "openai_compatible"
  api_key_env: "SPARK_API_KEY"  # 讯飞星辰 MaaS Coding Plan 专属 API Key
  model: "astron-code-latest"
  base_url: "https://maas-coding-api.cn-huabei-1.xf-yun.com/v2"
  temperature: 0.7
  max_output_tokens: 4096       # astron-code-latest 支持的输出长度
  timeout: 120

build:
  site_dir: "site"
  episodes_dir: "site/episodes"
  episodes_index: "data/episodes.json"

entities:
  companies:
    - "谷歌"
    - "google"
    - "openai"
    - "微软"
    - "microsoft"
    - "英伟达"
    - "nvidia"
    - "苹果"
    - "apple"
    - "meta"
    - "anthropic"
