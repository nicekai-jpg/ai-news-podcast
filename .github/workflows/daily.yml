name: Daily Podcast

on:
  schedule:
    - cron: "43 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Episode date (YYYY-MM-DD), default is today"
        required: false
        type: string

permissions:
  contents: write

jobs:
  content:
    name: Content (fetch → script)
    runs-on: ubuntu-latest
    outputs:
      episode_id: ${{ steps.episode.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: uv sync --frozen

      - id: episode
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            echo "id=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "id=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Pipeline + report + script (no audio)
        env:
          TZ: Asia/Shanghai
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          EPISODE="${{ steps.episode.outputs.id }}"
          if [ -f "site/episodes/${EPISODE}.txt" ]; then
            echo "Script already exists for ${EPISODE}, skipping pipeline execution to avoid overwriting"
          else
            uv run podcast-pipeline
            uv run podcast-report
            uv run podcast-daily --no-audio
          fi

      - name: Commit content artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EPISODE="${{ steps.episode.outputs.id }}"
          git add data/briefs/ data/reports/ data/episodes.json
          git add -f "site/episodes/${EPISODE}.txt" "site/episodes/${EPISODE}.html"
          if git diff --cached --quiet; then
            echo "No content changes to commit"
          else
            git commit -m "daily: content $(date -u +%F) [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  tts:
    name: TTS (CosyVoice 2)
    needs: content
    runs-on: ubuntu-latest
    timeout-minutes: 240
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest content commit
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y sox libsox-dev ffmpeg

      - name: Install project dependencies
        run: uv sync --frozen

      - name: Cache CosyVoice
        uses: actions/cache@v4
        with:
          path: |
            ~/cosyvoice_src
            ~/cosyvoice_models
            ~/cosyvoice_venv
          key: cosyvoice-gha-v6

      - name: Setup CosyVoice environment
        run: bash scripts/setup_cosyvoice_env.sh

      - name: Synthesize episode audio
        run: |
          EPISODE="${{ needs.content.outputs.episode_id }}"
          export COSYVOICE_MODEL_DIR="$HOME/cosyvoice_models/CosyVoice2-0.5B"
          export PYTHONPATH="$HOME/cosyvoice_src:$HOME/cosyvoice_src/third_party/Matcha-TTS"
          "$HOME/cosyvoice_venv/bin/python" scripts/gha_tts_cosyvoice.py \
            --script "site/episodes/${EPISODE}.txt" \
            --output "site/episodes/${EPISODE}.mp3" \
            --model-dir "$HOME/cosyvoice_models/CosyVoice2-0.5B"

      - name: Publish feed and site
        env:
          TZ: Asia/Shanghai
        run: |
          uv sync --frozen
          EPISODE="${{ needs.content.outputs.episode_id }}"
          uv run podcast-publish --date "$EPISODE"

      - name: Commit audio and site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EPISODE="${{ needs.content.outputs.episode_id }}"
          git add -u site/ data/episodes.json
          git add -f "site/episodes/${EPISODE}.mp3" "site/episodes/${EPISODE}.html" "site/episodes/${EPISODE}.txt" "site/reports/daily_report_${EPISODE}.md"
          if git diff --cached --quiet; then
            echo "No audio changes to commit"
          else
            git commit -m "daily: audio $(date -u +%F) [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
