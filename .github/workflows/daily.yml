name: Daily Podcast

on:
  schedule:
    - cron: "43 21 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "Episode date (YYYY-MM-DD), default is today"
        required: false
        type: string

permissions:
  contents: write

jobs:
  stage1:
    name: Stage 1 (fetch → process)
    runs-on: ubuntu-latest
    outputs:
      episode_id: ${{ steps.episode.outputs.id }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: uv sync --frozen

      - id: episode
        run: |
          INPUT_DATE="${{ github.event.inputs.date }}"
          if [ -n "$INPUT_DATE" ]; then
            echo "id=$INPUT_DATE" >> "$GITHUB_OUTPUT"
          else
            echo "id=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pipeline
        env:
          TZ: Asia/Shanghai
        run: |
          EPISODE="${{ steps.episode.outputs.id }}"
          uv run podcast-pipeline --date "$EPISODE"

      - name: Commit brief
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EPISODE="${{ steps.episode.outputs.id }}"
          git add data/briefs/
          if git diff --cached --quiet; then
            echo "No brief changes to commit"
          else
            git commit -m "daily: brief $EPISODE [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  writer:
    name: Stage 3 (script generation)
    needs: stage1
    runs-on: ubuntu-latest
    outputs:
      episode_id: ${{ needs.stage1.outputs.episode_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest brief
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate script
        env:
          TZ: Asia/Shanghai
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          EPISODE="${{ needs.stage1.outputs.episode_id }}"
          uv run podcast-writer --date "$EPISODE"

      - name: Commit script
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EPISODE="${{ needs.stage1.outputs.episode_id }}"
          git add site/episodes/${EPISODE}.txt
          if git diff --cached --quiet; then
            echo "No script changes to commit"
          else
            git commit -m "daily: script $EPISODE [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  report:
    name: Stage 3b (daily report)
    needs: stage1
    runs-on: ubuntu-latest
    outputs:
      episode_id: ${{ needs.stage1.outputs.episode_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest brief
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Generate daily report
        env:
          TZ: Asia/Shanghai
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
        run: |
          EPISODE="${{ needs.stage1.outputs.episode_id }}"
          uv run podcast-report --date "$EPISODE"

      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EPISODE="${{ needs.stage1.outputs.episode_id }}"
          git add data/reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit"
          else
            git commit -m "daily: report $EPISODE [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  tts:
    name: Stage 4 (TTS audio)
    needs: writer
    runs-on: ubuntu-latest
    timeout-minutes: 240
    outputs:
      episode_id: ${{ needs.writer.outputs.episode_id }}
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest content
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y sox libsox-dev ffmpeg

      - name: Install dependencies
        run: uv sync --frozen

      - name: Cache CosyVoice
        uses: actions/cache@v4
        with:
          path: |
            ~/cosyvoice_src
            ~/cosyvoice_models
            ~/cosyvoice_venv
          key: cosyvoice-gha-v6

      - name: Setup CosyVoice environment
        run: bash scripts/setup_cosyvoice_env.sh

      - name: Synthesize episode audio
        run: |
          EPISODE="${{ needs.writer.outputs.episode_id }}"
          export COSYVOICE_MODEL_DIR="$HOME/cosyvoice_models/CosyVoice2-0.5B"
          export PYTHONPATH="$HOME/cosyvoice_src:$HOME/cosyvoice_src/third_party/Matcha-TTS"
          # Stage 4: 使用 podcast-tts CLI，但需要特殊 Python 环境
          "$HOME/cosyvoice_venv/bin/python" scripts/gha_tts_cosyvoice.py \
            --script "site/episodes/${EPISODE}.txt" \
            --output "site/episodes/${EPISODE}.mp3" \
            --model-dir "$HOME/cosyvoice_models/CosyVoice2-0.5B"

      - name: Commit audio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EPISODE="${{ needs.writer.outputs.episode_id }}"
          git add -u site/
          if git diff --cached --quiet; then
            echo "No audio changes to commit"
          else
            git commit -m "daily: audio $EPISODE [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

  publish:
    name: Stage 5 (publish site)
    needs: [tts, report]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Pull latest content
        run: git pull origin main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Publish feed and site
        env:
          TZ: Asia/Shanghai
        run: |
          EPISODE="${{ needs.tts.outputs.episode_id || needs.report.outputs.episode_id }}"
          uv run podcast-publish --date "$EPISODE"

      - name: Commit site
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          EPISODE="${{ needs.tts.outputs.episode_id || needs.report.outputs.episode_id }}"
          git add -u site/ data/episodes.json
          git add -f "site/reports/daily_report_${EPISODE}.md"
          if git diff --cached --quiet; then
            echo "No site changes to commit"
          else
            git commit -m "daily: publish $EPISODE [skip ci]"
            git pull --rebase origin main
            git push origin main
          fi

      - name: Remove .gitignore to ensure ignored files are deployed
        run: rm -f .gitignore

      - name: Deploy GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
