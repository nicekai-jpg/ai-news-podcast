name: Daily Podcast

on:
  schedule:
    - cron: "43 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run data pipeline (fetch → dedup → cluster → score)
        env:
          TZ: Asia/Shanghai
          SPARK_API_KEY: ${{ secrets.SPARK_API_KEY }}
        run: uv run podcast-pipeline

      - name: Generate daily report (科技日报)
        env:
          TZ: Asia/Shanghai
          SPARK_API_KEY: ${{ secrets.SPARK_API_KEY }}
        run: uv run podcast-report

      - name: Generate podcast episode
        env:
          TZ: Asia/Shanghai
          SPARK_API_KEY: ${{ secrets.SPARK_API_KEY }}
        run: uv run podcast-daily

      - name: Commit generated data and reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/episodes.json data/reports/ data/briefs/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "daily: update episodes index, reports, and news briefs $(date -u +%F) [skip ci]"
            git push
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          keep_files: true
