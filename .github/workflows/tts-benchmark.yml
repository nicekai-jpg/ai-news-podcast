name: TTS Benchmark (CosyVoice2 + GPT-SoVITS, CPU)

on:
  workflow_dispatch:
    inputs:
      test_text:
        description: "测试文本"
        required: false
        default: "云阳老师，你又带上了技术极客的视角了啊！你能不能给咱们听众翻译翻译，这个机制被 AI 破解到底意味着什么？"

jobs:
  # ─────────────────────────────────────────────
  # Job 1: CosyVoice 2 (zero-shot voice clone)
  # ─────────────────────────────────────────────
  cosyvoice2:
    name: CosyVoice 2 (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps (sox, ffmpeg)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y sox libsox-dev ffmpeg

      - name: Cache CosyVoice repo
        id: cache-cosyvoice
        uses: actions/cache@v4
        with:
          path: ~/cosyvoice_src
          key: cosyvoice-src-v1

      - name: Clone CosyVoice (if not cached)
        if: steps.cache-cosyvoice.outputs.cache-hit != 'true'
        run: |
          git clone --recursive --depth=1 \
            https://github.com/FunAudioLLM/CosyVoice.git \
            ~/cosyvoice_src

      - name: Install CosyVoice dependencies
        run: |
          cd ~/cosyvoice_src
          pip install --upgrade pip setuptools
          # Install without CUDA/TensorRT packages
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install conformer==0.3.2 diffusers==0.29.0 hydra-core==1.3.2 \
            HyperPyYAML==1.2.3 inflect librosa omegaconf onnx onnxruntime \
            openai-whisper protobuf pyworld rich soundfile transformers \
            x-transformers wetext huggingface_hub

      - name: Cache CosyVoice model weights
        uses: actions/cache@v4
        with:
          path: ~/cosyvoice_models
          key: cosyvoice2-0.5B-v1

      - name: Download CosyVoice2-0.5B model
        run: |
          python - <<'EOF'
          from huggingface_hub import snapshot_download
          import os
          local_dir = os.path.expanduser("~/cosyvoice_models/CosyVoice2-0.5B")
          if not os.path.exists(os.path.join(local_dir, "cosyvoice2.yaml")):
              snapshot_download(
                  "FunAudioLLM/CosyVoice2-0.5B",
                  local_dir=local_dir,
                  ignore_patterns=["*.bin"]  # prefer safetensors
              )
              print(f"Downloaded to {local_dir}")
          else:
              print("Model already cached")
          EOF

      - name: Prepare reference audio (Edge-TTS)
        run: |
          pip install edge-tts
          # Generate reference audio for voice cloning
          edge-tts --voice "zh-CN-XiaoyiNeural" \
            --text "云阳老师，你又带上了技术极客的视角了啊！你能不能给咱们听众翻译翻译，这个机制被 AI 破解到底意味着什么？" \
            --write-media /tmp/ref_female.mp3
          # Convert to 16kHz mono WAV (CosyVoice requirement)
          ffmpeg -i /tmp/ref_female.mp3 -ar 16000 -ac 1 /tmp/ref_female.wav -y

          edge-tts --voice "zh-CN-YunyangNeural" \
            --text "云阳，咱们今天这选题，你看啊，从底层神经网络的突破，到应用端那些草根团队基于协议和开源模型做的创新，真的非常有意思。" \
            --write-media /tmp/ref_male.mp3
          ffmpeg -i /tmp/ref_male.mp3 -ar 16000 -ac 1 /tmp/ref_male.wav -y

      - name: Run CosyVoice2 inference (4 tests × 2 voices)
        run: |
          export PYTHONPATH=~/cosyvoice_src:~/cosyvoice_src/third_party/Matcha-TTS
          mkdir -p /tmp/cosyvoice_out

          python - <<'EOF'
          import sys, os, time, torchaudio
          sys.path.insert(0, os.path.expanduser("~/cosyvoice_src"))
          sys.path.insert(0, os.path.expanduser("~/cosyvoice_src/third_party/Matcha-TTS"))

          from cosyvoice.cli.cosyvoice import CosyVoice2
          from cosyvoice.utils.file_utils import load_wav

          model_dir = os.path.expanduser("~/cosyvoice_models/CosyVoice2-0.5B")
          cosyvoice = CosyVoice2(model_dir, load_jit=False, load_trt=False)

          test_texts = {
              "A": "云阳老师，你又带上了技术极客的视角了啊！你能不能给咱们听众翻译翻译，这个机制被 AI 破解到底意味着什么？天哪，真的假的？",
              "B": "云阳，咱们今天这选题，你看啊，从底层神经网络的突破，到应用端那些草根团队基于 MCP 协议和开源 LLM 做的创新，真的非常有意思。",
              "C": "智源研究院联合清华大学在科学杂志发表了名为 Brain mu 的模型，该模型基于脑电波数据，首次揭示了睡眠期间大脑巩固与重组记忆的后台源代码。",
              "D": "在2026年6月6日，约有98%的传统鞋企开始转型切入AI数据赛道，实现了近两倍的业务增长。",
          }

          voices = [
              ("female_xiaoyi", "/tmp/ref_female.wav",
               "云阳老师，你又带上了技术极客的视角了啊！你能不能给咱们听众翻译翻译，这个机制被 AI 破解到底意味着什么？"),
              ("male_yunyang", "/tmp/ref_male.wav",
               "云阳，咱们今天这选题，你看啊，从底层神经网络的突破，到应用端那些草根团队基于协议和开源模型做的创新，真的非常有意思。"),
          ]

          timings = []
          for name, ref_path, ref_text in voices:
              ref_audio = load_wav(ref_path, 16000)
              for key, gen_text in test_texts.items():
                  out_path = f"/tmp/cosyvoice_out/cosyvoice2_{name}_{key}.wav"
                  print(f"Generating {out_path}...")
                  t0 = time.time()
                  output = next(cosyvoice.inference_zero_shot(
                      gen_text, ref_text, ref_audio, stream=False
                  ))
                  elapsed = time.time() - t0
                  torchaudio.save(out_path, output["tts_speech"], cosyvoice.sample_rate)
                  size_kb = os.path.getsize(out_path) // 1024
                  print(f"  ✅ {elapsed:.1f}s  {size_kb} KB")
                  timings.append((out_path, elapsed, size_kb))

          print("\n=== TIMING SUMMARY ===")
          total = sum(t for _, t, _ in timings)
          for p, t, s in timings:
              print(f"  {os.path.basename(p):<40} {t:6.1f}s  {s:4d} KB")
          print(f"\n  Total: {total:.1f}s ({total/60:.1f} min)")
          EOF

      - name: Upload CosyVoice2 audio samples
        uses: actions/upload-artifact@v4
        with:
          name: cosyvoice2-samples
          path: /tmp/cosyvoice_out/*.wav
          retention-days: 7

  # ─────────────────────────────────────────────
  # Job 2: GPT-SoVITS (built-in Chinese voices)
  # ─────────────────────────────────────────────
  gptsovits:
    name: GPT-SoVITS (CPU)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Cache GPT-SoVITS repo
        id: cache-gptsovits
        uses: actions/cache@v4
        with:
          path: ~/gptsovits_src
          key: gptsovits-src-v1

      - name: Clone GPT-SoVITS (if not cached)
        if: steps.cache-gptsovits.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 \
            https://github.com/RVC-Boss/GPT-SoVITS.git \
            ~/gptsovits_src

      - name: Install GPT-SoVITS dependencies (CPU only)
        run: |
          cd ~/gptsovits_src
          pip install --upgrade pip
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          # Install core deps excluding GPU/CUDA packages
          pip install \
            numpy scipy soundfile librosa \
            transformers huggingface_hub \
            edge-tts

      - name: Prepare reference audio
        run: |
          edge-tts --voice "zh-CN-XiaoyiNeural" \
            --text "云阳老师，你又带上了技术极客的视角了啊！你能不能给咱们听众翻译翻译，这个机制被 AI 破解到底意味着什么？" \
            --write-media /tmp/ref_female_gpt.mp3
          ffmpeg -i /tmp/ref_female_gpt.mp3 -ar 32000 -ac 1 /tmp/ref_female_gpt.wav -y

          edge-tts --voice "zh-CN-YunyangNeural" \
            --text "云阳，咱们今天这选题，你看啊，从底层神经网络的突破，到应用端那些草根团队基于协议和开源模型做的创新，真的非常有意思。" \
            --write-media /tmp/ref_male_gpt.mp3
          ffmpeg -i /tmp/ref_male_gpt.mp3 -ar 32000 -ac 1 /tmp/ref_male_gpt.wav -y

      - name: Download GPT-SoVITS pretrained weights
        run: |
          python - <<'EOF'
          from huggingface_hub import hf_hub_download, snapshot_download
          import os

          # Download the base pretrained weights
          os.makedirs(os.path.expanduser("~/gptsovits_weights"), exist_ok=True)
          snapshot_download(
              "lj1995/GPT-SoVITS",
              local_dir=os.path.expanduser("~/gptsovits_weights"),
              ignore_patterns=["*.bin", "s1*"]  # skip large training weights
          )
          print("Weights downloaded")
          EOF

      - name: Run GPT-SoVITS TTS inference
        run: |
          export PYTHONPATH=~/gptsovits_src
          mkdir -p /tmp/gptsovits_out

          python - <<'EOF'
          import sys, os, time
          sys.path.insert(0, os.path.expanduser("~/gptsovits_src"))

          test_texts = {
              "A": "云阳老师，你又带上了技术极客的视角了啊！你能不能给咱们听众翻译翻译，这个机制被 AI 破解到底意味着什么？天哪，真的假的？",
              "B": "云阳，咱们今天这选题，你看啊，从底层神经网络的突破，到应用端那些草根团队基于 MCP 协议和开源 LLM 做的创新，真的非常有意思。",
              "C": "智源研究院联合清华大学在科学杂志发表了名为 Brain mu 的模型，该模型基于脑电波数据，首次揭示了睡眠期间大脑巩固与重组记忆的后台源代码。",
              "D": "在2026年6月6日，约有98%的传统鞋企开始转型切入AI数据赛道，实现了近两倍的业务增长。",
          }

          # Try to import and run GPT-SoVITS inference
          try:
              from GPT_SoVITS.inference_webui import get_tts_wav
              import soundfile as sf

              voices = [
                  ("female_xiaoyi", "/tmp/ref_female_gpt.wav",
                   "云阳老师，你又带上了技术极客的视角了啊！你能不能给咱们听众翻译翻译，这个机制被 AI 破解到底意味着什么？"),
                  ("male_yunyang", "/tmp/ref_male_gpt.wav",
                   "云阳，咱们今天这选题，你看啊，从底层神经网络的突破，到应用端那些草根团队基于协议和开源模型做的创新，真的非常有意思。"),
              ]

              timings = []
              for vname, ref_path, ref_text in voices:
                  for key, gen_text in test_texts.items():
                      t0 = time.time()
                      sr, audio = next(get_tts_wav(
                          ref_wav_path=ref_path,
                          prompt_text=ref_text,
                          prompt_language="zh",
                          text=gen_text,
                          text_language="zh",
                      ))
                      elapsed = time.time() - t0
                      out_path = f"/tmp/gptsovits_out/gptsovits_{vname}_{key}.wav"
                      sf.write(out_path, audio, sr)
                      size_kb = os.path.getsize(out_path) // 1024
                      print(f"  ✅ {os.path.basename(out_path)} — {elapsed:.1f}s  {size_kb} KB")
                      timings.append((out_path, elapsed, size_kb))

              total = sum(t for _, t, _ in timings)
              print(f"\n  Total: {total:.1f}s ({total/60:.1f} min)")
          except Exception as e:
              print(f"GPT-SoVITS inference failed: {e}")
              import traceback; traceback.print_exc()
          EOF

      - name: Upload GPT-SoVITS audio samples
        uses: actions/upload-artifact@v4
        with:
          name: gptsovits-samples
          path: /tmp/gptsovits_out/*.wav
          retention-days: 7
          if-no-files-found: warn
