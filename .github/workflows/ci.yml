name: CI Quality Assurance

on:
  pull_request:
    branches: [main]

jobs:
  lint-and-check:
    name: Lint & Safety Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for proper diffing if needed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run pre-commit checks
        uses: pre-commit/action@v3.0.1
